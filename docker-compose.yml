services:
  mysql:
    image: mysql:8.0
    container_name: datacenter-monitor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: datacenter_monitor
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
      - --local-infile=1
    volumes:
      - ./mysql-data:/var/lib/mysql
